<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EmpreendaBanco</title>

<style>
body{
    margin:0;
    background:#f5f6fa;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    background:#fff;
    padding:30px;
    border-radius:20px;
    width:400px;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

h1{
    margin-top:0;
    color:#1C2233;
}

input{
    width:100%;
    padding:15px;
    border-radius:10px;
    border:1px solid #ccc;
    box-sizing:border-box;
    margin-bottom:20px;
    font-size:16px;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#FF6A1A;
    color:#fff;
    font-size:16px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="box">

    <h1>EmpreendaBanco</h1>

    <input 
        type="text" 
        id="nome"
        placeholder="Digite seu nome"
        autocomplete="off"
        value=""
    >

    <button type="button" onclick="abrirGPT()">
        Abrir ChatGPT
    </button>

</div>

<script>
window.onload = function(){
    document.getElementById("nome").value = "";
};

function abrirGPT(){

    const campoNome = document.getElementById("nome");
    const nomeDigitado = campoNome.value.trim();

    if(nomeDigitado === ""){
        alert("Digite seu nome");
        return;
    }

    const pergunta = 
        "Meu nome é " + nomeDigitado + 
        ". Como posso me organizar melhor como gerente bancário?";

    const url = 
        "https://chatgpt.com/?q=" + 
        encodeURIComponent(pergunta) + 
        "&v=" + new Date().getTime();

    window.open(url, "_blank_" + new Date().getTime());

    campoNome.value = "";

    setTimeout(function(){
        window.location.href = window.location.pathname + "?reload=" + new Date().getTime();
    }, 500);
}
</script>

</body>
</html>
