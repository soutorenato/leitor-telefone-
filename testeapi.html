<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vivo Empresas B2B</title>

<style>
body{
    margin:0;
    background:#f5f6fa;
    font-family:Arial, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.box{
    background:#fff;
    padding:30px;
    border-radius:20px;
    width:100%;
    max-width:500px;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

h1{
    margin-top:0;
    color:#660099;
    font-size:24px;
}

p{
    color:#555;
    font-size:14px;
    line-height:1.5;
}

.tabs{
    display:flex;
    gap:10px;
    margin:25px 0;
}

.tab{
    flex:1;
    padding:12px;
    border:none;
    border-radius:12px;
    background:#eee;
    color:#333;
    font-weight:bold;
    cursor:pointer;
}

.tab.active{
    background:#660099;
    color:#fff;
}

.formulario{
    display:none;
}

.formulario.active{
    display:block;
}

label{
    font-weight:bold;
    color:#333;
    display:block;
    margin-bottom:8px;
}

input, select{
    width:100%;
    padding:15px;
    border-radius:10px;
    border:1px solid #ccc;
    box-sizing:border-box;
    margin-bottom:18px;
    font-size:16px;
}

button.enviar{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#660099;
    color:#fff;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}

.obs{
    margin-top:15px;
    font-size:12px;
    color:#666;
    line-height:1.5;
}
</style>
</head>

<body>

<div class="box">

    <h1>Vivo Empresas B2B</h1>

    <p>
        Escolha uma opção para abrir o ChatGPT com um prompt pronto para análise comercial consultiva.
    </p>

    <div class="tabs">
        <button class="tab active" onclick="trocarAba('carteira')">
            Cliente da Carteira
        </button>

        <button class="tab" onclick="trocarAba('prospeccao')">
            Prospecção
        </button>
    </div>

    <div id="carteira" class="formulario active">

        <label>Seu nome</label>
        <input type="text" id="nomeCarteira" placeholder="Digite seu nome" autocomplete="off">

        <label>Nome da empresa</label>
        <input type="text" id="empresaCarteira" placeholder="Digite o nome da empresa cliente" autocomplete="off">

        <button class="enviar" onclick="abrirClienteCarteira()">
            Preparar visita ao cliente
        </button>

    </div>

    <div id="prospeccao" class="formulario">

        <label>Seu nome</label>
        <input type="text" id="nomeProspec" placeholder="Digite seu nome" autocomplete="off">

        <label>CEP base</label>
        <input type="text" id="cepProspec" placeholder="Exemplo: 09668130" autocomplete="off">

        <label>Raio de busca</label>
        <select id="raioProspec">
            <option value="5 km">5 quilômetros</option>
            <option value="10 km">10 quilômetros</option>
            <option value="15 km">15 quilômetros</option>
            <option value="20 km">20 quilômetros</option>
        </select>

        <button class="enviar" onclick="abrirProspecao()">
            Pesquisar empresas da região
        </button>

    </div>

    <div class="obs">
        O ChatGPT abrirá com a pergunta preenchida. Pode ser necessário clicar em enviar dentro do ChatGPT.
    </div>

</div>

<script>
function trocarAba(aba){

    document.querySelectorAll('.tab').forEach(btn => {
        btn.classList.remove('active');
    });

    document.querySelectorAll('.formulario').forEach(form => {
        form.classList.remove('active');
    });

    document.getElementById(aba).classList.add('active');

    if(aba === 'carteira'){
        document.querySelectorAll('.tab')[0].classList.add('active');
    } else {
        document.querySelectorAll('.tab')[1].classList.add('active');
    }
}

function abrirClienteCarteira(){

    const nome = document.getElementById("nomeCarteira").value.trim();
    const empresa = document.getElementById("empresaCarteira").value.trim();

    if(nome === ""){
        alert("Digite seu nome");
        return;
    }

    if(empresa === ""){
        alert("Digite o nome da empresa");
        return;
    }

    const pergunta = 
`Meu nome é ${nome}.

Sou gerente comercial da Vivo Empresas e atuo com vendas B2B.

Tenho uma visita comercial com a empresa ${empresa}.

Quero que você me ajude a me preparar para essa reunião.

Traga uma análise prática com:

1. O que essa empresa faz
2. Segmento de atuação
3. Área principal da empresa, como varejo, saúde, logística, indústria, finanças, tecnologia, educação, alimentação ou outro
4. Capital social da empresa, se houver informação pública disponível
5. Possíveis necessidades de telecom, conectividade, internet, telefonia móvel, dados, segurança digital, cloud, IoT, redes, PABX em nuvem ou soluções digitais
6. Possíveis dores do cliente
7. Como eu devo conduzir a conversa comercial
8. Argumentos de valor para uma venda consultiva B2B
9. Cuidados para não parecer apenas um vendedor de produto
10. Sugestão de roteiro para a reunião
11. Possíveis oportunidades para Vivo Empresas
12. Perguntas inteligentes que eu devo fazer na visita
13. Como finalizar a visita com próximos passos claros
14. Site, LinkedIn ou presença digital da empresa, se existir

Importante:
Use apenas informações públicas disponíveis na internet.
Não invente dados.
Quando alguma informação for estimada, deixe claro que é uma estimativa.
Responda como um mentor comercial experiente em vendas consultivas B2B.`;

    abrirChatGPT(pergunta);
}

function abrirProspecao(){

    const nome = document.getElementById("nomeProspec").value.trim();
    const cep = document.getElementById("cepProspec").value.trim();
    const raio = document.getElementById("raioProspec").value;

    if(nome === ""){
        alert("Digite seu nome");
        return;
    }

    if(cep === ""){
        alert("Digite o CEP base");
        return;
    }

    const pergunta = 
`Meu nome é ${nome}.

Sou gerente comercial da Vivo Empresas e atuo com vendas B2B.

Quero fazer uma prospecção consultiva por região.

CEP base: ${cep}
Raio de busca: ${raio}

Pesquise empresas próximas desse CEP com potencial para soluções Vivo Empresas.

Priorize empresas com:
- estrutura comercial
- operação ativa
- potencial corporativo
- possível faturamento acima de R$ 20 mil por mês
- necessidade de conectividade e tecnologia

Monte uma lista detalhada contendo:

1. Nome da empresa
2. Segmento de atuação
3. Área principal da empresa, como varejo, saúde, logística, indústria, finanças, tecnologia, educação, alimentação ou outro
4. Capital social da empresa
5. Porte estimado
6. Endereço aproximado ou bairro
7. Possíveis necessidades de telecom e tecnologia
8. Possíveis dores da operação
9. Oportunidades para Vivo Empresas
10. Melhor abordagem comercial
11. Perguntas inteligentes para a visita
12. Sugestão de primeiro contato comercial
13. Sinais públicos de crescimento da empresa
14. Site, LinkedIn ou presença digital da empresa, se existir

Importante:
Use apenas informações públicas disponíveis na internet.
Quando o faturamento não estiver disponível, faça estimativa baseada em porte, estrutura, número de funcionários, capital social, presença digital, operação, avaliações, filiais, site, LinkedIn ou notícias.
Não invente dados.
Quando alguma informação for estimada, deixe claro que é uma estimativa.
Se possível, apresente em formato de tabela.`;

    abrirChatGPT(pergunta);
}

function abrirChatGPT(pergunta){

    const url = 
        "https://chatgpt.com/?q=" + 
        encodeURIComponent(pergunta) + 
        "&v=" + new Date().getTime();

    window.open(url, "_blank_" + new Date().getTime());

    setTimeout(function(){
        window.location.href = window.location.pathname + "?reload=" + new Date().getTime();
    }, 500);
}
</script>

</body>
</html>
