<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comitê de Crédito - Multi Cases</title>

<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Comfortaa',sans-serif;background:#f4f6f8;overflow:hidden}
.header{
height:78px;background:linear-gradient(90deg,#1E2F55,#111827);
display:flex;align-items:center;justify-content:space-between;
padding:0 24px;color:#fff;
}
.header-left,.header-right{display:flex;align-items:center;gap:16px}
.header h1{font-size:22px}
.header span{color:#FF6A1A}
.stage-btn{
width:40px;height:40px;border-radius:50%;border:none;cursor:pointer;
font-weight:700;background:#1f2937;color:#fff;
}
.stage-btn.active{background:#FF6A1A;color:#111827}
.case-selector{
position:relative;
}
.case-trigger{
background:rgba(255,255,255,.1);
border:1px solid rgba(255,255,255,.15);
width:42px;height:42px;border-radius:12px;
display:flex;align-items:center;justify-content:center;
cursor:pointer;
}
.case-dropdown{
display:none;
position:absolute;
top:52px;right:0;
background:#fff;
border-radius:12px;
box-shadow:0 12px 30px rgba(0,0,0,.18);
min-width:180px;
overflow:hidden;
z-index:999;
}
.case-option{
padding:14px;
cursor:pointer;
font-size:13px;
border-bottom:1px solid #eee;
}
.case-option:hover{background:#f8fafc}
.main{
height:calc(100vh - 78px);
padding:18px;
display:grid;
grid-template-columns:repeat(3,1fr);
grid-template-rows:repeat(2,1fr);
gap:16px;
}
.panel{
background:#fff;border-radius:18px;padding:18px;
border:1px solid #e5e7eb;
box-shadow:0 8px 24px rgba(15,23,42,.08);
overflow:hidden;
}
.panel-header{
display:flex;justify-content:space-between;align-items:center;
margin-bottom:14px;
}
.panel-title{
display:flex;align-items:center;gap:8px;font-weight:700;font-size:15px;
}
.material-symbols-outlined{color:#FF6A1A}
.content{overflow-y:auto}
.item{
display:flex;justify-content:space-between;
padding:10px 0;border-bottom:1px solid #eef2f7;
font-size:13px;
}
.label{color:#64748b}
.value{font-weight:700}
.good{color:#15803d}
.alert{color:#b45309}
.danger{color:#dc2626}
.btn{
background:rgba(255,106,26,.1);
border:1px solid rgba(255,106,26,.3);
color:#FF6A1A;
padding:7px 12px;
border-radius:999px;
cursor:pointer;
font-size:12px;
font-weight:700;
}
.modal{
display:none;position:fixed;inset:0;
background:rgba(0,0,0,.5);
align-items:center;justify-content:center;
z-index:9999;
}
.modal-box{
background:#fff;width:850px;max-height:80vh;
overflow-y:auto;border-radius:20px;padding:24px;
}
.close{
float:right;border:none;background:none;
font-size:28px;cursor:pointer;
}
</style>
</head>
<body>

<div class="header">

<div class="header-left">
<h1>Ficha 360 Crédito PF Alta Renda <span id="caseTitle">| Case 01</span></h1>
</div>

<div class="header-right">

<button id="btn1" class="stage-btn active" onclick="setStage(1)">1</button>
<button id="btn2" class="stage-btn" onclick="setStage(2)">2</button>

<div class="case-selector">
<div class="case-trigger" onclick="toggleCases()">
<span class="material-symbols-outlined" style="color:#fff;">person</span>
</div>

<div class="case-dropdown" id="caseDropdown">
<div class="case-option" onclick="setCase(1)">Case 01 — Henrique Martins</div>
<div class="case-option" onclick="setCase(2)">Case 02 — Maria Aparecida da Silva</div>
<div class="case-option" onclick="setCase(3)">Case 03 — Lucas Barreto de Moraes</div>
</div>
</div>

</div>
</div>

<div class="main" id="dashboard"></div>

<div class="modal" id="modal">
<div class="modal-box">
<button class="close" onclick="closeModal()">×</button>
<h2 id="modalTitle"></h2>
<div id="modalContent"></div>
</div>
</div>

<script>
let currentCase = 1;
let currentStage = 1;

const cases = {

1:{
title:"Case 01",
name:"Henrique Martins",
data:{
1:{
cliente:["Henrique Martins","Advogado","R$ 40.000","Sem Restritivos"],
saldo:["R$ 18.500","R$ 40.000","R$ 58.500"],
cartao:["R$ 5.000","R$ 3.280","Adimplente"],
invest:["R$ 150.000"],
produtos:["Nenhum"],
historico:["Sem registros"]
},
2:{
cliente:["Henrique Martins","Advogado","R$ 40.000","Com Restrição"],
saldo:["-R$ 37.438","R$ 40.000","R$ 2.561"],
cartao:["R$ 80.000","R$ 38.700","Em Atraso"],
invest:["R$ 0"],
produtos:["3 Produtos"],
historico:["Jan/2026"]
}
}
},

2:{
title:"Case 02",
name:"Maria Aparecida da Silva",
data:{
1:{
cliente:["Maria Aparecida da Silva","Médica","R$ 35.000","Sem Restritivos"],
saldo:["R$ 92.000","R$ 15.000","R$ 107.000"],
cartao:["R$ 25.000","R$ 8.300","Adimplente"],
invest:["R$ 1.000.000"],
produtos:["Nenhum"],
historico:["15/03/2025"]
},
2:{
cliente:["Maria Aparecida da Silva","Médica","R$ 35.000","Sem Restritivos"],
saldo:["-R$ 12.300","R$ 15.000","R$ 2.700"],
cartao:["R$ 25.000","R$ 24.100","Em atraso"],
invest:["R$ 420.000"],
produtos:["Crédito Imob + Seguro"],
historico:["Abr/2026"]
}
}
},

3:{
title:"Case 03",
name:"Lucas Barreto de Moraes",
data:{
1:{
cliente:["Lucas Barreto de Moraes","Empresário","R$ 60.000","Sem Restritivos"],
saldo:["R$ 120.000","R$ 50.000","R$ 170.000"],
cartao:["R$ 30.000","R$ 11.000","Adimplente"],
invest:["R$ 500.000"],
produtos:["Nenhum"],
historico:["Sem registros"]
},
2:{
cliente:["Lucas Barreto de Moraes","Empresário","R$ 60.000","Com Restrição"],
saldo:["-R$ 48.200","R$ 50.000","R$ 1.800"],
cartao:["R$ 120.000","R$ 118.000","Em atraso"],
invest:["R$ 0"],
produtos:["Capital Giro + Cartão"],
historico:["Fev/2026"]
}
}
}

};

function renderDashboard(){
const c = cases[currentCase];
const d = c.data[currentStage];

document.getElementById("caseTitle").innerText = "| " + c.title;

document.getElementById("dashboard").innerHTML = `
${createPanel("Dados do Cliente","person",["Nome","Profissão","Renda","Serasa"],d.cliente,"cliente")}
${createPanel("Saldo e Limites","account_balance_wallet",["Saldo Atual","Limite","Disponível"],d.saldo,"saldo")}
${createPanel("Cartão de Crédito","credit_card",["Limite","Fatura","Status"],d.cartao,"cartao")}
${createPanel("Investimentos","trending_up",["Saldo Investimentos"],d.invest,"invest")}
${createPanel("Produtos","inventory_2",["Produtos"],d.produtos,"produtos")}
${createPanel("Histórico","history",["Último Registro"],d.historico,"historico")}
`;

document.getElementById("btn1").classList.toggle("active",currentStage===1);
document.getElementById("btn2").classList.toggle("active",currentStage===2);
}

function createPanel(title,icon,labels,values,key){
let items="";
labels.forEach((l,i)=>{
items+=`<div class="item"><span class="label">${l}</span><span class="value">${values[i]}</span></div>`;
});

return `
<div class="panel">
<div class="panel-header">
<div class="panel-title">
<span class="material-symbols-outlined">${icon}</span>${title}
</div>
<button class="btn" onclick="openModal('${key}')">Detalhar</button>
</div>
<div class="content">${items}</div>
</div>
`;
}

function setStage(stage){
currentStage=stage;
renderDashboard();
}

function setCase(c){
currentCase=c;
renderDashboard();
document.getElementById("caseDropdown").style.display="none";
}

function toggleCases(){
const dd=document.getElementById("caseDropdown");
dd.style.display=dd.style.display==="block"?"none":"block";
}

function openModal(type){
document.getElementById("modalTitle").innerText=type;
document.getElementById("modalContent").innerHTML="<p>Detalhamento deste bloco pode ser customizado individualmente por case/etapa.</p>";
document.getElementById("modal").style.display="flex";
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

renderDashboard();
</script>

</body>
</html>
