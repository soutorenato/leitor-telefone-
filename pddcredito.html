<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ficha 360 Crédito PF Alta Renda</title>

<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:'Comfortaa',sans-serif;
background:#f4f6f8;
overflow:hidden;
color:#111827;
}
.header{
height:78px;
background:linear-gradient(90deg,#1E2F55,#111827);
display:flex;
justify-content:space-between;
align-items:center;
padding:0 24px;
color:#fff;
}
.header h1{font-size:22px}
.header span{color:#FF6A1A}
.header-left,.header-right{
display:flex;
align-items:center;
gap:14px;
}
.stage-btn{
width:40px;
height:40px;
border-radius:50%;
border:none;
cursor:pointer;
font-weight:700;
background:#1f2937;
color:#fff;
}
.stage-btn.active{
background:#FF6A1A;
color:#111827;
}
.case-selector{position:relative}
.case-trigger{
width:42px;
height:42px;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
background:rgba(255,255,255,.1);
border:1px solid rgba(255,255,255,.12);
}
.case-dropdown{
display:none;
position:absolute;
top:54px;
right:0;
width:250px;
background:#fff;
border-radius:14px;
box-shadow:0 12px 30px rgba(0,0,0,.18);
overflow:hidden;
z-index:999;
}
.case-option{
padding:14px;
cursor:pointer;
font-size:13px;
border-bottom:1px solid #eee;
color:#111827;
}
.case-option:hover{background:#f8fafc}
.main{
height:calc(100vh - 78px);
padding:18px;
display:grid;
grid-template-columns:repeat(3,1fr);
grid-template-rows:repeat(2,1fr);
gap:16px;
}
.panel{
background:#fff;
border-radius:18px;
padding:18px;
border:1px solid #e5e7eb;
box-shadow:0 8px 24px rgba(15,23,42,.08);
overflow:hidden;
}
.panel-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:14px;
}
.panel-title{
display:flex;
align-items:center;
gap:8px;
font-weight:700;
font-size:15px;
}
.material-symbols-outlined{color:#FF6A1A}
.content{overflow-y:auto}
.item{
display:flex;
justify-content:space-between;
padding:10px 0;
border-bottom:1px solid #eef2f7;
font-size:13px;
}
.label{color:#64748b}
.value{font-weight:700}
.good{color:#15803d}
.alert{color:#b45309}
.danger{color:#dc2626}
.btn{
background:rgba(255,106,26,.10);
border:1px solid rgba(255,106,26,.30);
color:#FF6A1A;
padding:7px 12px;
border-radius:999px;
cursor:pointer;
font-size:12px;
font-weight:700;
}
.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.55);
align-items:center;
justify-content:center;
z-index:9999;
}
.modal-box{
width:920px;
max-height:82vh;
overflow-y:auto;
background:#fff;
border-radius:20px;
padding:24px;
}
.close{
float:right;
background:none;
border:none;
font-size:28px;
cursor:pointer;
}
table{
width:100%;
border-collapse:collapse;
font-size:13px;
}
th,td{
padding:10px;
border-bottom:1px solid #e5e7eb;
text-align:left;
}
th{color:#64748b}
.accordion{
background:rgba(255,106,26,.10);
border:1px solid rgba(255,106,26,.30);
padding:14px;
border-radius:12px;
margin:10px 0;
cursor:pointer;
font-weight:700;
color:#FF6A1A;
}
.acc-content{
display:none;
background:#f8fafc;
padding:14px;
border-radius:12px;
margin-bottom:12px;
line-height:1.6;
}
</style>
</head>

<body>

<div class="header">
<div class="header-left">
<h1>Ficha 360 Crédito PF Alta Renda <span id="caseTitle">| Case 01</span></h1>
</div>

<div class="header-right">
<button id="btn1" class="stage-btn active" onclick="setStage(1)">1</button>
<button id="btn2" class="stage-btn" onclick="setStage(2)">2</button>

<div class="case-selector">
<div class="case-trigger" onclick="toggleCases()">
<span class="material-symbols-outlined" style="color:#fff;">person</span>
</div>

<div class="case-dropdown" id="caseDropdown">
<div class="case-option" onclick="setCase(1)">Case 01 — Henrique Martins</div>
<div class="case-option" onclick="setCase(2)">Case 02 — Maria Aparecida da Silva</div>
<div class="case-option" onclick="setCase(3)">Case 03 — Lucas Barreto de Moraes</div>
</div>
</div>
</div>
</div>

<div class="main" id="dashboard"></div>

<div class="modal" id="modal">
<div class="modal-box">
<button class="close" onclick="closeModal()">×</button>
<h2 id="modalTitle"></h2>
<div id="modalContent"></div>
</div>
</div>

function renderDashboard(){
const c = cases[currentCase];
const d = c.data[currentStage];

document.getElementById("caseTitle").innerText = "| " + c.title;

document.getElementById("dashboard").innerHTML = `
${createPanel("Dados do Cliente","person",["Nome","Profissão","Renda","Serasa"],d.cards.cliente,"cliente")}
${createPanel("Saldo e Limites","account_balance_wallet",["Saldo Atual","Limite","Disponível"],d.cards.saldo,"saldo")}
${createPanel("Cartão de Crédito","credit_card",["Limite","Fatura","Status"],d.cards.cartao,"cartao")}
${createPanel("Investimentos","trending_up",["Saldo Investimentos"],d.cards.investimentos,"investimentos")}
${createPanel("Produtos","inventory_2",["Produtos"],d.cards.produtos,"produtos")}
${createPanel("Histórico","history",["Último Registro"],d.cards.historico,"historico")}
`;

document.getElementById("btn1").classList.toggle("active",currentStage===1);
document.getElementById("btn2").classList.toggle("active",currentStage===2);
}

function createPanel(title,icon,labels,values,key){
let items="";
labels.forEach((l,i)=>{
items+=`<div class="item"><span class="label">${l}</span><span class="value">${values[i]}</span></div>`;
});

return `
<div class="panel">
<div class="panel-header">
<div class="panel-title">
<span class="material-symbols-outlined">${icon}</span>${title}
</div>
<button class="btn" onclick="openModal('${key}')">Detalhar</button>
</div>
<div class="content">${items}</div>
</div>
`;
}

function setStage(stage){
currentStage=stage;
renderDashboard();
}

function setCase(c){
currentCase=c;
currentStage=1;
renderDashboard();
document.getElementById("caseDropdown").style.display="none";
}

function toggleCases(){
const dd=document.getElementById("caseDropdown");
dd.style.display=dd.style.display==="block"?"none":"block";
}

function openModal(type){
const d = cases[currentCase].data[currentStage];

document.getElementById("modalTitle").innerText = titles[type];
document.getElementById("modalContent").innerHTML = d.modals[type];
document.getElementById("modal").style.display = "flex";
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

function toggleAcc(id){
const el=document.getElementById(id);
el.style.display=el.style.display==="block"?"none":"block";
}

renderDashboard();
</script>

</body>
</html>
