<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ficha 360 Crédito PF Alta Renda</title>

<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Comfortaa',sans-serif;
  background:#f4f6f8;
  color:#111827;
  overflow:hidden;
}

.header{
  height:78px;
  background:linear-gradient(90deg,#1E2F55,#111827);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:0 24px;
  color:#fff;
}

.header-center{
  display:flex;
  align-items:center;
  gap:20px;
}

.header h1{font-size:22px}
.header span{color:#FF6A1A}

.stage-buttons{display:flex;gap:10px}

.stage-btn{
  width:40px;
  height:40px;
  border-radius:50%;
  border:1px solid rgba(255,255,255,.18);
  cursor:pointer;
  font-weight:700;
  font-family:inherit;
  background:#1f2937;
  color:#cbd5e1;
}

.stage-btn.active{
  background:#FF6A1A !important;
  color:#111827 !important;
  border-color:#FF6A1A;
}

.main{
  height:calc(100vh - 78px);
  padding:18px;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  grid-template-rows:repeat(2,1fr);
  gap:16px;
}

.panel{
  background:#fff;
  border-radius:18px;
  border:1px solid #e5e7eb;
  padding:18px;
  display:flex;
  flex-direction:column;
  overflow:hidden;
  box-shadow:0 8px 24px rgba(15,23,42,.08);
}

.panel-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:14px;
}

.panel-title{
  display:flex;
  align-items:center;
  gap:8px;
  font-size:15px;
  font-weight:700;
}

.material-symbols-outlined{color:#FF6A1A}

.content{overflow-y:auto}

.item{
  display:flex;
  justify-content:space-between;
  padding:10px 0;
  border-bottom:1px solid #eef2f7;
  font-size:13px;
}

.label{color:#64748b}
.value{font-weight:700}
.good{color:#15803d}
.alert{color:#b45309}
.danger{color:#dc2626}

.btn{
  background:rgba(255,106,26,.10);
  color:#FF6A1A;
  border:1px solid rgba(255,106,26,.35);
  border-radius:999px;
  padding:7px 12px;
  cursor:pointer;
  font-size:12px;
  font-weight:700;
  font-family:inherit;
}

.btn:hover{
  background:#FF6A1A;
  color:#111827;
}

.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.55);
  align-items:center;
  justify-content:center;
  z-index:999;
}

.modal-box{
  width:900px;
  max-height:82vh;
  overflow-y:auto;
  background:#fff;
  color:#111827;
  border-radius:20px;
  padding:24px;
  border:1px solid #e5e7eb;
}

.close{
  float:right;
  background:none;
  border:none;
  color:#111827;
  font-size:28px;
  cursor:pointer;
}

table{
  width:100%;
  border-collapse:collapse;
  font-size:13px;
}

th,td{
  padding:10px;
  border-bottom:1px solid #e5e7eb;
}

th{
  color:#64748b;
}

.accordion{
  background:rgba(255,106,26,.10);
  border:1px solid rgba(255,106,26,.35);
  color:#FF6A1A;
  padding:14px;
  border-radius:12px;
  margin:10px 0;
  cursor:pointer;
  font-weight:700;
}

.acc-content{
  display:none;
  background:#f8fafc;
  border-radius:12px;
  padding:14px;
  margin-bottom:12px;
  color:#334155;
  line-height:1.6;
}
</style>
</head>

<body>

<div class="header">
  <div class="header-center">
    <h1>Ficha 360 Crédito PF Alta Renda <span>| Case 01</span></h1>
    <div class="stage-buttons">
      <button id="btn1" class="stage-btn active" onclick="setStage(1)">1</button>
      <button id="btn2" class="stage-btn" onclick="setStage(2)">2</button>
    </div>
  </div>
</div>

<div class="main">

<section class="panel">
  <div class="panel-header">
    <div class="panel-title"><span class="material-symbols-outlined">person</span>Dados do Cliente</div>
    <button class="btn" onclick="openModal('cliente')">Detalhar</button>
  </div>
  <div class="content" id="cliente-card"></div>
</section>

<section class="panel">
  <div class="panel-header">
    <div class="panel-title"><span class="material-symbols-outlined">account_balance_wallet</span>Saldo e Limites</div>
    <button class="btn" onclick="openModal('saldo')">Detalhar</button>
  </div>
  <div class="content" id="saldo-card"></div>
</section>

<section class="panel">
  <div class="panel-header">
    <div class="panel-title"><span class="material-symbols-outlined">credit_card</span>Cartão de Crédito</div>
    <button class="btn" onclick="openModal('cartao')">Detalhar</button>
  </div>
  <div class="content" id="cartao-card"></div>
</section>

<section class="panel">
  <div class="panel-header">
    <div class="panel-title"><span class="material-symbols-outlined">trending_up</span>Investimentos</div>
    <button class="btn" onclick="openModal('investimentos')">Detalhar</button>
  </div>
  <div class="content" id="investimentos-card"></div>
</section>

<section class="panel">
  <div class="panel-header">
    <div class="panel-title"><span class="material-symbols-outlined">inventory_2</span>Produtos</div>
    <button class="btn" onclick="openModal('produtos')">Detalhar</button>
  </div>
  <div class="content" id="produtos-card"></div>
</section>

<section class="panel">
  <div class="panel-header">
    <div class="panel-title"><span class="material-symbols-outlined">history</span>Histórico de Atendimento</div>
    <button class="btn" onclick="openModal('historico')">Detalhar</button>
  </div>
  <div class="content" id="historico-card"></div>
</section>

</div>

<div class="modal" id="modal">
  <div class="modal-box">
    <button class="close" onclick="closeModal()">×</button>
    <h2 id="modalTitle"></h2>
    <div id="modalContent"></div>
  </div>
</div>

const titles = {
  cliente:"Dados Complementares do Cliente",
  saldo:"Extrato da Conta Corrente",
  cartao:"Faturas do Cartão de Crédito",
  investimentos:"Investimentos",
  produtos:"Produtos",
  historico:"Histórico de Atendimento"
};

function renderStage(){
  const cards = data[currentStage].cards;

  document.getElementById("cliente-card").innerHTML = cards.cliente;
  document.getElementById("saldo-card").innerHTML = cards.saldo;
  document.getElementById("cartao-card").innerHTML = cards.cartao;
  document.getElementById("investimentos-card").innerHTML = cards.investimentos;
  document.getElementById("produtos-card").innerHTML = cards.produtos;
  document.getElementById("historico-card").innerHTML = cards.historico;

  document.getElementById("btn1").classList.toggle("active", currentStage === 1);
  document.getElementById("btn2").classList.toggle("active", currentStage === 2);
}

function setStage(stage){
  currentStage = stage;
  renderStage();
}

function openModal(type){
  document.getElementById("modalTitle").innerHTML = titles[type];
  document.getElementById("modalContent").innerHTML = data[currentStage].modals[type];
  document.getElementById("modal").style.display = "flex";
}

function closeModal(){
  document.getElementById("modal").style.display = "none";
}

function toggleAcc(id){
  const el = document.getElementById(id);
  el.style.display = el.style.display === "block" ? "none" : "block";
}

renderStage();
</script>

</body>
</html>
