<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ficha 360 Crédito PF Alta Renda</title>

<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Comfortaa',sans-serif;
  background:#0b1120;
  color:#fff;
  overflow:hidden;
}
.header{
  height:78px;
  background:linear-gradient(90deg,#1E2F55,#111827);
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 24px;
  border-bottom:1px solid rgba(255,255,255,.08);
}
.header-left,.header-right{width:220px;}
.header-center{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:18px;
}
.header h1{
  font-size:22px;
}
.header span{
  color:#FF6A1A;
}
.stage-buttons{
  display:flex;
  gap:10px;
}
.stage-btn{
  width:38px;
  height:38px;
  border-radius:50%;
  border:none;
  cursor:pointer;
  font-weight:700;
  font-family:inherit;
  background:#1f2937;
  color:#cbd5e1;
  border:1px solid rgba(255,255,255,.08);
}
.stage-btn.active{
  background:#FF6A1A;
  color:#111827;
}
.main{
  height:calc(100vh - 78px);
  padding:18px;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  grid-template-rows:repeat(2,1fr);
  gap:16px;
}
.panel{
  background:#111827;
  border-radius:18px;
  border:1px solid rgba(255,255,255,.08);
  padding:18px;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}
.panel-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:14px;
}
.panel-title{
  display:flex;
  align-items:center;
  gap:8px;
  font-size:15px;
  font-weight:700;
}
.material-symbols-outlined{
  color:#FF6A1A;
}
.content{
  overflow-y:auto;
}
.item{
  display:flex;
  justify-content:space-between;
  padding:10px 0;
  border-bottom:1px solid rgba(255,255,255,.06);
  font-size:13px;
}
.label{color:#94a3b8}
.value{font-weight:700}
.good{color:#86efac}
.alert{color:#fbbf24}
.danger{color:#f87171}
.btn{
  background:rgba(255,106,26,.12);
  color:#FF6A1A;
  border:1px solid rgba(255,106,26,.35);
  border-radius:999px;
  padding:7px 12px;
  cursor:pointer;
  font-size:12px;
  font-weight:700;
  font-family:inherit;
}
.btn:hover{
  background:#FF6A1A;
  color:#111827;
}
.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.75);
  align-items:center;
  justify-content:center;
  z-index:999;
}
.modal-box{
  width:850px;
  max-height:82vh;
  overflow-y:auto;
  background:#111827;
  border-radius:20px;
  padding:24px;
  border:1px solid rgba(255,255,255,.08);
}
.close{
  float:right;
  background:none;
  border:none;
  color:#fff;
  font-size:28px;
  cursor:pointer;
}
table{
  width:100%;
  border-collapse:collapse;
  font-size:13px;
}
th,td{
  padding:10px;
  border-bottom:1px solid rgba(255,255,255,.06);
}
th{
  color:#94a3b8;
}
.accordion{
  background:rgba(255,106,26,.12);
  border:1px solid rgba(255,106,26,.35);
  color:#FF6A1A;
  padding:14px;
  border-radius:12px;
  margin:10px 0;
  cursor:pointer;
  font-weight:700;
}
.acc-content{
  display:none;
  background:#0b1120;
  border-radius:12px;
  padding:14px;
  margin-bottom:12px;
  color:#cbd5e1;
  line-height:1.6;
}
</style>
</head>
<body>

<div class="header">
  <div class="header-left"></div>

  <div class="header-center">
    <h1>Ficha 360 Crédito PF Alta Renda <span>| Case 01</span></h1>
    <div class="stage-buttons">
      <button class="stage-btn active" onclick="setStage(1)">1</button>
      <button class="stage-btn" onclick="setStage(2)">2</button>
    </div>
  </div>

  <div class="header-right"></div>
</div>

<div class="main">

  <section class="panel">
    <div class="panel-header">
      <div class="panel-title"><span class="material-symbols-outlined">person</span>Dados do Cliente</div>
      <button class="btn" onclick="openModal('cliente')">Detalhar</button>
    </div>
    <div class="content" id="cliente-card"></div>
  </section>

  <section class="panel">
    <div class="panel-header">
      <div class="panel-title"><span class="material-symbols-outlined">account_balance_wallet</span>Saldo e Limites</div>
      <button class="btn" onclick="openModal('saldo')">Detalhar</button>
    </div>
    <div class="content" id="saldo-card"></div>
  </section>

  <section class="panel">
    <div class="panel-header">
      <div class="panel-title"><span class="material-symbols-outlined">credit_card</span>Cartão de Crédito</div>
      <button class="btn" onclick="openModal('cartao')">Detalhar</button>
    </div>
    <div class="content" id="cartao-card"></div>
  </section>

  <section class="panel">
    <div class="panel-header">
      <div class="panel-title"><span class="material-symbols-outlined">trending_up</span>Investimentos</div>
      <button class="btn" onclick="openModal('investimentos')">Detalhar</button>
    </div>
    <div class="content" id="invest-card"></div>
  </section>

  <section class="panel">
    <div class="panel-header">
      <div class="panel-title"><span class="material-symbols-outlined">inventory_2</span>Produtos</div>
      <button class="btn" onclick="openModal('produtos')">Detalhar</button>
    </div>
    <div class="content" id="produtos-card"></div>
  </section>

  <section class="panel">
    <div class="panel-header">
      <div class="panel-title"><span class="material-symbols-outlined">history</span>Histórico de Atendimento</div>
      <button class="btn" onclick="openModal('historico')">Detalhar</button>
    </div>
    <div class="content" id="historico-card"></div>
  </section>

</div>

<div class="modal" id="modal">
  <div class="modal-box">
    <button class="close" onclick="closeModal()">×</button>
    <h2 id="modalTitle"></h2>
    <div id="modalContent"></div>
  </div>
</div>

<script>
let currentStage = 1;

const stages = {
  1: {
    cards: {
      cliente: `
        <div class="item"><span class="label">Nome</span><span class="value">Dr. Henrique Martins</span></div>
        <div class="item"><span class="label">Profissão</span><span class="value">Advogado</span></div>
        <div class="item"><span class="label">Renda Atualizada</span><span class="value good">R$ 40.000</span></div>
        <div class="item"><span class="label">Fonte da Renda</span><span class="value">Extrato Bancário</span></div>
        <div class="item"><span class="label">Restrição Serasa</span><span class="value good">Sem Restritivos</span></div>
      `,
      saldo: `
        <div class="item"><span class="label">Saldo Atual</span><span class="value good">R$ 18.500</span></div>
        <div class="item"><span class="label">Limite Conta</span><span class="value">R$ 40.000</span></div>
        <div class="item"><span class="label">Limite Disponível</span><span class="value good">R$ 58.500</span></div>
      `,
      cartao: `
        <div class="item"><span class="label">Limite Cartão</span><span class="value">R$ 5.000</span></div>
        <div class="item"><span class="label">Fatura Atual</span><span class="value">R$ 3.280</span></div>
        <div class="item"><span class="label">Status</span><span class="value good">Adimplente</span></div>
      `,
      investimentos: `
        <div class="item"><span class="label">Saldo Investimento</span><span class="value good">R$ 150.000</span></div>
      `,
      produtos: `
        <div class="item"><span class="label">Produtos Ativos</span><span class="value">Nenhum</span></div>
      `,
      historico: `
        <div class="item"><span class="label">Histórico</span><span class="value">Sem registros</span></div>
      `
    }
  },

  2: {
    cards: {
      cliente: `
        <div class="item"><span class="label">Nome</span><span class="value">Dr. Henrique Martins</span></div>
        <div class="item"><span class="label">Profissão</span><span class="value">Advogado</span></div>
        <div class="item"><span class="label">Renda Atualizada</span><span class="value good">R$ 40.000</span></div>
        <div class="item"><span class="label">Fonte da Renda</span><span class="value">Extrato Bancário</span></div>
        <div class="item"><span class="label">Restrição Serasa</span><span class="value danger">Com Restrição</span></div>
      `,
      saldo: `
        <div class="item"><span class="label">Saldo Atual</span><span class="value danger">-R$ 37.438,10</span></div>
        <div class="item"><span class="label">Limite Conta</span><span class="value">R$ 40.000</span></div>
        <div class="item"><span class="label">Limite Disponível</span><span class="value danger">R$ 2.561,90</span></div>
      `,
      cartao: `
        <div class="item"><span class="label">Limite Cartão</span><span class="value danger">R$ 80.000</span></div>
        <div class="item"><span class="label">Fatura Atual</span><span class="value danger">R$ 38.700</span></div>
        <div class="item"><span class="label">Status</span><span class="value danger">Em Atraso</span></div>
      `,
      investimentos: `
        <div class="item"><span class="label">Saldo Investimento</span><span class="value danger">R$ 0,00</span></div>
      `,
      produtos: `
        <div class="item"><span class="label">Empréstimo Pessoal</span><span class="value">Ativo</span></div>
        <div class="item"><span class="label">Seguro de Vida</span><span class="value">Ativo</span></div>
        <div class="item"><span class="label">Consórcio</span><span class="value">Ativo</span></div>
      `,
      historico: `
        <div class="item"><span class="label">Último Registro</span><span class="value">Jan/2026</span></div>
        <div class="item"><span class="label">Gerente</span><span class="value">Paulo Eduardo</span></div>
      `
    }
  }
};

function renderStage(){
  const data = stages[currentStage].cards;
  Object.keys(data).forEach(key=>{
    document.getElementById(`${key}-card`).innerHTML = data[key];
  });

  document.querySelectorAll('.stage-btn').forEach((btn,i)=>{
    btn.classList.toggle('active', i+1===currentStage);
  });
}

function setStage(stage){
  currentStage = stage;
  renderStage();
}

function openModal(type){
  let title = "";
  let content = "";

  if(type==="cliente"){
    title = "Dados Complementares do Cliente";
    content = currentStage===1
      ? `<p>Cliente sem restritivos no momento da concessão.</p>`
      : `<p><strong>Restritivos Identificados:</strong></p>
         <ul>
           <li>Pendência em Cartório: R$ 18.420</li>
           <li>Restrição Bancária: R$ 42.880</li>
         </ul>`;
  }

  if(type==="historico"){
    title = "Histórico de Atendimento";
    content = currentStage===1
      ? `<p>Sem histórico relevante antes da concessão.</p>`
      : `
      <div class="accordion" onclick="toggleAcc('h1')">Atendimento Janeiro/2026 | Paulo Eduardo</div>
      <div id="h1" class="acc-content" style="display:block;">
        Cliente contratou empréstimo de R$ 100.000, consórcio e seguro de vida.
        <br><br>
        Renda atualizada via extrato em R$ 40.000/mês.
        <br><br>
        Limite do cartão ampliado de R$ 5.000 para R$ 80.000.
      </div>`;
  }

  if(title===""){
    title = "Detalhamento";
    content = "<p>Detalhamento disponível apenas para esta etapa do protótipo.</p>";
  }

  document.getElementById("modalTitle").innerHTML = title;
  document.getElementById("modalContent").innerHTML = content;
  document.getElementById("modal").style.display = "flex";
}

function closeModal(){
  document.getElementById("modal").style.display = "none";
}

function toggleAcc(id){
  const el = document.getElementById(id);
  el.style.display = el.style.display === "block" ? "none" : "block";
}

renderStage();
</script>

</body>
</html>
