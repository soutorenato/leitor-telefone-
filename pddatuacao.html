<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sistema PDD | Aula Prática</title>

  <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />

  <style>
    * {
      box-sizing: border-box;
      font-family: 'Comfortaa', sans-serif;
    }

    body {
      margin: 0;
      background: #f3f6fb;
      color: #1c2233;
    }

    header {
      background: #003b71;
      color: white;
      padding: 22px 32px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    header .material-symbols-outlined {
      font-size: 36px;
    }

    header h1 {
      margin: 0;
      font-size: 24px;
    }

    .container {
      padding: 28px;
    }

    .card {
      background: white;
      border-radius: 18px;
      padding: 22px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
      margin-bottom: 24px;
    }

    .card h2 {
      margin-top: 0;
      display: flex;
      align-items: center;
      gap: 8px;
      color: #003b71;
    }

    .table-area {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 900px;
    }

    th {
      background: #003b71;
      color: white;
      padding: 14px;
      text-align: left;
      font-size: 13px;
    }

    td {
      padding: 13px;
      border-bottom: 1px solid #e6eaf0;
      font-size: 13px;
      vertical-align: middle;
    }

    tr:hover {
      background: #f4f8ff;
    }

    .cliente-link {
      color: #003b71;
      font-weight: 700;
      cursor: pointer;
      text-decoration: underline;
    }

    select, input {
      width: 100%;
      padding: 9px;
      border-radius: 10px;
      border: 1px solid #ccd5e0;
      font-family: 'Comfortaa', sans-serif;
      font-size: 12px;
    }

    .btn-icon {
      border: none;
      background: #003b71;
      color: white;
      border-radius: 10px;
      padding: 8px 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn-icon:hover {
      background: #005299;
    }

    .status-regularizou {
      color: #12805c;
      font-weight: 700;
    }

    .status-nao {
      color: #b3261e;
      font-weight: 700;
    }

    .status-andamento {
      color: #b26a00;
      font-weight: 700;
    }

    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 999;
      padding: 24px;
    }

    .modal-content {
      background: white;
      max-width: 900px;
      margin: 40px auto;
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 12px 32px rgba(0,0,0,0.22);
      animation: abrir .2s ease;
    }

    @keyframes abrir {
      from {
        transform: translateY(20px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 18px;
    }

    .modal-header h3 {
      margin: 0;
      color: #003b71;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .close {
      border: none;
      background: #eef2f7;
      border-radius: 50%;
      width: 38px;
      height: 38px;
      cursor: pointer;
      font-size: 22px;
    }

    .ficha-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
    }

    .info-box {
      background: #f4f8ff;
      padding: 14px;
      border-radius: 14px;
      border-left: 4px solid #003b71;
    }

    .info-box strong {
      display: block;
      color: #003b71;
      margin-bottom: 5px;
      font-size: 12px;
    }

    @media (max-width: 700px) {
      .container {
        padding: 16px;
      }

      header {
        padding: 18px;
      }

      header h1 {
        font-size: 18px;
      }

      .ficha-grid {
        grid-template-columns: 1fr;
      }

      .modal-content {
        margin: 10px auto;
      }
    }
  </style>
</head>

function dinheiro(valor) {
  return valor.toLocaleString('pt-BR', {
    style: 'currency',
    currency: 'BRL'
  });
}

function carregarClientes() {
  const tabela = document.getElementById("clientesTabela");
  tabela.innerHTML = "";

  clientes.forEach((cliente, index) => {
    tabela.innerHTML += `
      <tr>
        <td>
          <span class="cliente-link" onclick="abrirOperacoes(${index})">
            ${cliente.nome}
          </span>
        </td>
        <td>${dinheiro(cliente.risco)}</td>
        <td><strong>${dinheiro(cliente.pdd)}</strong></td>
        <td>
          <select onchange="alterarStatus(this)">
            <option value="">Selecionar</option>
            <option value="regularizou">Regularizou</option>
            <option value="nao">Não regularizou</option>
            <option value="andamento">Em andamento</option>
          </select>
        </td>
        <td>
          <input type="text" placeholder="Ex: Cliente acionado, aguardando retorno..." />
        </td>
        <td>
          <button class="btn-icon" onclick="abrirFicha(${index})" title="Abrir ficha">
            <span class="material-symbols-outlined">person</span>
          </button>
        </td>
      </tr>
    `;
  });
}

function alterarStatus(select) {
  select.className = "";

  if (select.value === "regularizou") {
    select.classList.add("status-regularizou");
  }

  if (select.value === "nao") {
    select.classList.add("status-nao");
  }

  if (select.value === "andamento") {
    select.classList.add("status-andamento");
  }
}

function abrirOperacoes(index) {
  const cliente = clientes[index];

  let html = `
    <h3>${cliente.nome}</h3>
    <div class="table-area">
      <table>
        <thead>
          <tr>
            <th>Produto</th>
            <th>Risco Atualizado</th>
            <th>Dias em Atraso</th>
            <th>PDD da Operação</th>
          </tr>
        </thead>
        <tbody>
  `;

  cliente.operacoes.forEach(op => {
    html += `
      <tr>
        <td>${op[0]}</td>
        <td>${dinheiro(op[1])}</td>
        <td>${op[2]} dias</td>
        <td><strong>${dinheiro(op[3])}</strong></td>
      </tr>
    `;
  });

  html += `
        </tbody>
      </table>
    </div>
  `;

  document.getElementById("operacoesConteudo").innerHTML = html;
  document.getElementById("modalOperacoes").style.display = "block";
}

function abrirFicha(index) {
  const cliente = clientes[index];

  document.getElementById("fichaConteudo").innerHTML = `
    <div class="ficha-grid">
      <div class="info-box">
        <strong>Nome</strong>
        ${cliente.nome}
      </div>

      <div class="info-box">
        <strong>CPF</strong>
        ${cliente.cpf}
      </div>

      <div class="info-box">
        <strong>Telefone</strong>
        ${cliente.telefone}
      </div>

      <div class="info-box">
        <strong>E-mail</strong>
        ${cliente.email}
      </div>

      <div class="info-box" style="grid-column: 1 / -1;">
        <strong>Endereço</strong>
        ${cliente.endereco}
      </div>

      <div class="info-box">
        <strong>Risco Total</strong>
        ${dinheiro(cliente.risco)}
      </div>

      <div class="info-box">
        <strong>PDD Total Gerada</strong>
        ${dinheiro(cliente.pdd)}
      </div>
    </div>
  `;

  document.getElementById("modalFicha").style.display = "block";
}

function fecharModal(id) {
  document.getElementById(id).style.display = "none";
}

window.onclick = function(event) {
  if (event.target.classList.contains("modal")) {
    event.target.style.display = "none";
  }
}

carregarClientes();
