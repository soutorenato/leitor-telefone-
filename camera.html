<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Detector: TV / Sofá / Quadro</title>
  <style>
    body { font-family: system-ui, Arial, sans-serif; margin: 16px; }
    .wrap { display: grid; gap: 12px; max-width: 900px; }
    .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
    video, canvas { width: 100%; max-width: 900px; border-radius: 12px; background: #111; }
    .card { padding: 12px; border: 1px solid #ddd; border-radius: 12px; }
    .badge { display: inline-block; padding: 6px 10px; border-radius: 999px; background: #f2f2f2; margin-right: 8px; }
    .ok { background: #e9f7ef; }
    button { padding: 10px 14px; border-radius: 10px; border: 1px solid #ccc; background: #fff; cursor: pointer; }
    small { color: #666; }
  </style>
</head>
<body>
  <div class="wrap">
    <h2>Detecção em tempo real: Televisão • Sofá • Quadro</h2>

    <div class="row">
      <button id="btnStart">Iniciar câmera</button>
      <button id="btnStop" disabled>Parar</button>

      <label class="card">
        Confiança mínima:
        <input id="minScore" type="range" min="0.30" max="0.90" step="0.05" value="0.55" />
        <span id="minScoreVal">0.55</span>
      </label>

      <div class="card">
        <div><span class="badge">Status</span> <span id="status">Aguardando iniciar…</span></div>
        <div style="margin-top:8px">
          <span class="badge ok">Detectados</span>
          <span id="detected">—</span>
        </div>
        <small>Obs.: “Televisão” costuma vir como <b>tv</b> ou <b>monitor</b> no modelo.</small>
      </div>
    </div>

    <div style="position: relative;">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="canvas"></canvas>
    </div>
  </div>

  <!-- TensorFlow.js + modelo COCO-SSD -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.20.0/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3"></script>

  <script>
    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    const btnStart = document.getElementById("btnStart");
    const btnStop = document.getElementById("btnStop");
    const statusEl = document.getElementById("status");
    const detectedEl = document.getElementById("detected");
    const minScore = document.getElementById("minScore");
    const minScoreVal = document.getElementById("minScoreVal");

    // Mapeia classes do COCO-SSD para PT-BR
    // (o modelo costuma retornar: "tv", "couch", "potted plant", "person", etc.)
    const targetMap = new Map([
      ["tv", "Televisão"],
      ["monitor", "Televisão"], // fallback (nem sempre aparece)
      ["couch", "Sofá"],
      ["sofa", "Sofá"],         // fallback (nem sempre aparece)
      ["picture frame", "Quadro"],
      ["painting", "Quadro"]    // fallback (nem sempre aparece)
    ]);

    let stream = null;
    let model = null;
    let rafId = null;

    minScore.addEventListener("input", () => {
      minScoreVal.textContent = Number(minScore.value).toFixed(2);
    });

    async function startCamera() {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: "environment" },
        audio: false
      });
      video.srcObject = stream;

      await new Promise(resolve => {
        video.onloadedmetadata = () => resolve();
      });

      // Ajusta canvas ao vídeo
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;

      statusEl.textContent = "Carregando modelo…";
      model = await cocoSsd.load();
      statusEl.textContent = "Rodando detecção…";

      loop();
    }

    function stopCamera() {
      if (rafId) cancelAnimationFrame(rafId);
      rafId = null;

      if (stream) {
        stream.getTracks().forEach(t => t.stop());
        stream = null;
      }
      video.srcObject = null;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      detectedEl.textContent = "—";
      statusEl.textContent = "Parado.";
    }

    function drawBox(pred, labelPT) {
      const [x, y, w, h] = pred.bbox;
      ctx.lineWidth = 3;
      ctx.strokeStyle = "#00ff88";
      ctx.strokeRect(x, y, w, h);

      const text = `${labelPT} (${Math.round(pred.score * 100)}%)`;
      ctx.font = "18px system-ui";
      const tw = ctx.measureText(text).width;

      ctx.fillStyle = "rgba(0,0,0,0.55)";
      ctx.fillRect(x, Math.max(0, y - 26), tw + 10, 26);
      ctx.fillStyle = "#fff";
      ctx.fillText(text, x + 5, Math.max(18, y - 7));
    }

    async function loop() {
      // Desenha o frame atual no canvas
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

      const predictions = await model.detect(canvas);
      const threshold = Number(minScore.value);

      // Filtra só TV / Sofá / Quadro acima do threshold
      const hits = predictions
        .filter(p => p.score >= threshold)
        .map(p => ({
          raw: p.class,
          pt: targetMap.get(p.class),
          pred: p
        }))
        .filter(x => Boolean(x.pt));

      // Mostra lista (sem repetir)
      const unique = [...new Set(hits.map(h => h.pt))];
      detectedEl.textContent = unique.length ? unique.join(" • ") : "—";

      // Redesenha frame e caixas (para ficar por cima)
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      hits.forEach(h => drawBox(h.pred, h.pt));

      rafId = requestAnimationFrame(loop);
    }

    btnStart.addEventListener("click", async () => {
      btnStart.disabled = true;
      btnStop.disabled = false;

      try {
        await startCamera();
      } catch (err) {
        console.error(err);
        statusEl.textContent = "Erro ao iniciar (verifique permissão da câmera).";
        btnStart.disabled = false;
        btnStop.disabled = true;
      }
    });

    btnStop.addEventListener("click", () => {
      stopCamera();
      btnStart.disabled = false;
      btnStop.disabled = true;
    });
  </script>
</body>
</html>
