<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Verificação facial (1:1) - Demo</title>
  <style>
    body { font-family: system-ui, Arial, sans-serif; margin: 16px; }
    .row { display:flex; gap:12px; flex-wrap:wrap; align-items:center; }
    video, canvas { width: 100%; max-width: 900px; border-radius: 12px; background:#111; }
    button { padding: 10px 14px; border-radius: 10px; border: 1px solid #ccc; background: #fff; cursor: pointer; }
    .card { border:1px solid #ddd; border-radius:12px; padding:12px; }
    .badge { display:inline-block; padding:6px 10px; border-radius:999px; background:#f2f2f2; }
    .ok { background:#e9f7ef; }
    .bad { background:#fdecea; }
  </style>
</head>
<body>
  <h2>Verificação facial (1:1) no navegador</h2>

  <div class="row">
    <button id="btnStart">Iniciar câmera</button>
    <button id="btnEnroll" disabled>Cadastrar meu rosto</button>
    <button id="btnStop" disabled>Parar</button>

    <label class="card">
      Threshold (quanto menor, mais rígido):
      <input id="threshold" type="range" min="0.35" max="0.75" step="0.02" value="0.50"/>
      <span id="thrVal">0.50</span>
    </label>

    <div class="card">
      <div><span class="badge">Status</span> <span id="status">Aguardando…</span></div>
      <div style="margin-top:8px">
        <span class="badge" id="matchBadge">Sem cadastro</span>
        <span id="matchText">Cadastre seu rosto para comparar.</span>
      </div>
      <small>Isso é 1:1 (confere/não confere). Não identifica “quem é”.</small>
    </div>
  </div>

  <div style="position:relative; margin-top:12px;">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="overlay"></canvas>
  </div>

  <!-- face-api.js -->
  <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>

  <script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('overlay');
    const ctx = canvas.getContext('2d');

    const btnStart = document.getElementById('btnStart');
    const btnEnroll = document.getElementById('btnEnroll');
    const btnStop = document.getElementById('btnStop');

    const statusEl = document.getElementById('status');
    const matchBadge = document.getElementById('matchBadge');
    const matchText = document.getElementById('matchText');

    const threshold = document.getElementById('threshold');
    const thrVal = document.getElementById('thrVal');

    let stream = null;
    let rafId = null;

    // descritor do rosto cadastrado (Float32Array)
    let enrolledDescriptor = null;

    threshold.addEventListener('input', () => {
      thrVal.textContent = Number(threshold.value).toFixed(2);
    });

    async function loadModels() {
      statusEl.textContent = 'Carregando modelos…';
      // Usando modelos do próprio CDN (weights embutidos no face-api via fetch)
      // Para produção, o ideal é hospedar os modelos localmente.
      const MODEL_URL = 'https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/weights';
      await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
      await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
      await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);
      statusEl.textContent = 'Modelos carregados.';
    }

    async function startCamera() {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'user' },
        audio: false
      });
      video.srcObject = stream;

      await new Promise(resolve => {
        video.onloadedmetadata = () => resolve();
      });

      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;

      btnEnroll.disabled = false;
      statusEl.textContent = 'Câmera ligada. Pronto para cadastrar.';
      loop();
    }

    function stopCamera() {
      if (rafId) cancelAnimationFrame(rafId);
      rafId = null;

      if (stream) stream.getTracks().forEach(t => t.stop());
      stream = null;

      ctx.clearRect(0,0,canvas.width,canvas.height);
      video.srcObject = null;

      statusEl.textContent = 'Parado.';
      btnEnroll.disabled = true;
      matchBadge.textContent = enrolledDescriptor ? 'Cadastro mantido' : 'Sem cadastro';
      matchBadge.className = 'badge';
      matchText.textContent = '—';
    }

    async function enrollFace() {
      statusEl.textContent = 'Cadastrando… centralize o rosto e olhe para a câmera.';
      // pega um descritor do rosto atual
      const det = await faceapi
        .detectSingleFace(video, new faceapi.TinyFaceDetectorOptions({ inputSize: 320, scoreThreshold: 0.5 }))
        .withFaceLandmarks()
        .withFaceDescriptor();

      if (!det) {
        statusEl.textContent = 'Não encontrei um rosto. Tente novamente com mais luz.';
        return;
      }

      enrolledDescriptor = det.descriptor;
      statusEl.textContent = 'Rosto cadastrado! Agora comparando em tempo real.';
      matchBadge.textContent = 'Cadastrado';
      matchBadge.className = 'badge ok';
      matchText.textContent = 'Aproxime/afaste e veja se dá match.';
    }

    function setMatchUI(isMatch, dist) {
      if (!enrolledDescriptor) {
        matchBadge.textContent = 'Sem cadastro';
        matchBadge.className = 'badge';
        matchText.textContent = 'Cadastre seu rosto para comparar.';
        return;
      }

      if (isMatch) {
        matchBadge.textContent = 'MATCH';
        matchBadge.className = 'badge ok';
        matchText.textContent = `Confere (distância: ${dist.toFixed(3)})`;
      } else {
        matchBadge.textContent = 'NÃO MATCH';
        matchBadge.className = 'badge bad';
        matchText.textContent = `Não confere (distância: ${dist.toFixed(3)})`;
      }
    }

    async function loop() {
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

      const det = await faceapi
        .detectSingleFace(video, new faceapi.TinyFaceDetectorOptions({ inputSize: 320, scoreThreshold: 0.5 }))
        .withFaceLandmarks()
        .withFaceDescriptor();

      // desenha caixa do rosto se detectou
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      if (det) {
        const box = det.detection.box;
        ctx.lineWidth = 3;
        ctx.strokeStyle = '#00ff88';
        ctx.strokeRect(box.x, box.y, box.width, box.height);

        // compara com o cadastrado
        if (enrolledDescriptor) {
          const dist = faceapi.euclideanDistance(enrolledDescriptor, det.descriptor);
          const thr = Number(threshold.value);
          const isMatch = dist <= thr;
          setMatchUI(isMatch, dist);
        } else {
          setMatchUI(false, 999);
        }
      } else {
        // sem rosto
        if (enrolledDescriptor) {
          matchBadge.textContent = 'SEM ROSTO';
          matchBadge.className = 'badge';
          matchText.textContent = 'Não detectei rosto (melhore a luz).';
        } else {
          setMatchUI(false, 999);
        }
      }

      rafId = requestAnimationFrame(loop);
    }

    btnStart.addEventListener('click', async () => {
      btnStart.disabled = true;
      btnStop.disabled = false;
      try {
        await loadModels();
        await startCamera();
      } catch (e) {
        console.error(e);
        statusEl.textContent = 'Erro ao iniciar. Verifique permissão da câmera.';
        btnStart.disabled = false;
        btnStop.disabled = true;
      }
    });

    btnEnroll.addEventListener('click', enrollFace);

    btnStop.addEventListener('click', () => {
      stopCamera();
      btnStart.disabled = false;
      btnStop.disabled = true;
    });
  </script>
</body>
</html>
