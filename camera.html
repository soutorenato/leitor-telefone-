<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Teste de Câmera (iPhone)</title>
  <style>
    body { font-family: system-ui, -apple-system, Arial; margin: 16px; }
    button { padding: 12px 16px; border-radius: 10px; border: 1px solid #ccc; background: #fff; }
    video { width: 100%; max-width: 900px; border-radius: 12px; background: #111; margin-top: 12px; }
    pre { white-space: pre-wrap; border: 1px solid #ddd; padding: 10px; border-radius: 12px; margin-top: 12px; }
  </style>
</head>
<body>
  <h2>Teste de câmera (Safari iPhone)</h2>
  <button id="btn">Abrir câmera</button>

  <video id="v" autoplay playsinline muted></video>
  <pre id="log"></pre>

  <script>
    const btn = document.getElementById("btn");
    const v = document.getElementById("v");
    const log = document.getElementById("log");
    let stream;

    function p(s){ log.textContent += s + "\n"; }

    btn.addEventListener("click", async () => {
      log.textContent = "";
      p("isSecureContext: " + window.isSecureContext);
      p("UA: " + navigator.userAgent);
      p("mediaDevices: " + !!navigator.mediaDevices);
      p("getUserMedia: " + !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia));

      try {
        // MAIS COMPATÍVEL NO iOS
        stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });

        p("✅ getUserMedia OK");
        v.srcObject = stream;

        // iOS: garante que o vídeo realmente inicie após o gesto
        await v.play();

        p("✅ video.play OK");
        p("Video size: " + (v.videoWidth || "?") + "x" + (v.videoHeight || "?"));
      } catch (e) {
        p("❌ ERRO: " + e.name);
        p("Mensagem: " + (e.message || "—"));
      }
    });
  </script>
</body>
</html>
