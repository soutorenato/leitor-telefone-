<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Cadastro + Verificação Facial (1:1)</title>
  <style>
    body { font-family: system-ui, -apple-system, Arial, sans-serif; margin: 16px; }
    .row { display:flex; gap:12px; flex-wrap:wrap; align-items:center; }
    button, input { padding: 10px 14px; border-radius: 10px; border: 1px solid #cfcfcf; background: #fff; }
    button { cursor: pointer; }
    button:disabled { opacity: .5; cursor: not-allowed; }
    video, canvas { width: 100%; max-width: 900px; border-radius: 12px; background:#111; }
    .card { border:1px solid #ddd; border-radius:12px; padding:12px; max-width:900px; }
    .badge { display:inline-block; padding:6px 10px; border-radius:999px; background:#f2f2f2; }
    .ok { background:#e9f7ef; }
    .bad { background:#fdecea; }
    .mono { font-family: ui-monospace, Menlo, SFMono-Regular, monospace; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h2>Cadastro + verificação facial (1:1)</h2>

  <div class="row">
    <button id="btnStart">Abrir câmera</button>
    <button id="btnStop" disabled>Parar</button>

    <input id="nameInput" placeholder="Nome para cadastrar" />
    <button id="btnEnroll" disabled>Cadastrar rosto + nome</button>
    <button id="btnClear" disabled>Apagar cadastro</button>

    <label class="card" style="max-width:420px">
      Threshold (menor = mais rígido):
      <input id="threshold" type="range" min="0.35" max="0.75" step="0.02" value="0.50"/>
      <span id="thrVal" class="mono">0.50</span>
    </label>
  </div>

  <div class="card">
    <div><span class="badge">Status</span> <span id="status">Clique em “Abrir câmera”.</span></div>
    <div style="margin-top:10px">
      <span class="badge" id="badge">—</span>
      <span id="result">—</span>
    </div>
    <div style="margin-top:10px" class="mono" id="profile">Perfil ativo: —</div>
    <div style="margin-top:10px" class="mono" id="debug"></div>
  </div>

  <div style="position:relative; margin-top:12px;">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="overlay"></canvas>
  </div>

  <!-- face-api -->
  <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>

  <script>
    const btnStart = document.getElementById("btnStart");
    const btnStop  = document.getElementById("btnStop");
    const btnEnroll= document.getElementById("btnEnroll");
    const btnClear = document.getElementById("btnClear");

    const nameInput = document.getElementById("nameInput");
    const threshold = document.getElementById("threshold");
    const thrVal = document.getElementById("thrVal");

    const statusEl = document.getElementById("status");
    const badgeEl  = document.getElementById("badge");
    const resultEl = document.getElementById("result");
    const profileEl= document.getElementById("profile");
    const debugEl  = document.getElementById("debug");

    const video = document.getElementById("video");
    const canvas= document.getElementById("overlay");
    const ctx = canvas.getContext("2d");

    let stream = null;
    let rafId = null;
    let modelsLoaded = false;

    let enrolledName = null;
    let enrolledDescriptor = null; // Float32Array

    function log(msg) {
      debugEl.textContent += msg + "\n";
    }

    function resetDebug() {
      debugEl.textContent = "";
      log("HTTPS (isSecureContext): " + window.isSecureContext);
      log("UserAgent: " + navigator.userAgent);
      log("mediaDevices: " + !!navigator.mediaDevices);
      log("getUserMedia: " + !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia));
    }

    function saveProfile(name, descriptor) {
      localStorage.setItem("face_profile_v1", JSON.stringify({
        name,
        descriptor: Array.from(descriptor)
      }));
    }

    function loadProfile() {
      const raw = localStorage.getItem("face_profile_v1");
      if (!raw) return false;
      try {
        const parsed = JSON.parse(raw);
        enrolledName = parsed.name;
        enrolledDescriptor = new Float32Array(parsed.descriptor);
        return true;
      } catch {
        return false;
      }
    }

    function clearProfile() {
      localStorage.removeItem("face_profile_v1");
      enrolledName = null;
      enrolledDescriptor = null;
    }

    function updateProfileUI() {
      if (enrolledName && enrolledDescriptor) {
        profileEl.textContent = "Perfil ativo: " + enrolledName;
        btnClear.disabled = false;
      } else {
        profileEl.textContent = "Perfil ativo: —";
        btnClear.disabled = true;
      }
    }

    threshold.addEventListener("input", () => {
      thrVal.textContent = Number(threshold.value).toFixed(2);
    });

    async function loadModels() {
      if (modelsLoaded) return;
      statusEl.textContent = "Carregando modelos…";
      const MODEL_URL = "https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/weights";
      await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
      await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
      await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);
      modelsLoaded = true;
      statusEl.textContent = "Modelos carregados.";
    }

    async function openCamera() {
      resetDebug();

      // IMPORTANTE: pedir câmera somente após clique (gesto do usuário)
      statusEl.textContent = "Solicitando permissão da câmera… (aparecerá um pop-up)";
      badgeEl.textContent = "—";
      resultEl.textContent = "—";

      try {
        // iOS Safari: mais compatível
        stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });

        log("✅ getUserMedia OK");
        video.srcObject = stream;

        // iOS: garantir play após interação
        await video.play().catch(e => log("video.play() falhou: " + e.name));

        await new Promise(r => video.onloadedmetadata = r);
        canvas.width = video.videoWidth || 640;
        canvas.height = video.videoHeight || 480;

        log("Video size: " + canvas.width + "x" + canvas.height);

        statusEl.textContent = "Câmera ligada ✅";
        btnEnroll.disabled = false;

        loop();
      } catch (err) {
        console.error(err);
        log("❌ ERRO: " + err.name);
        log("Mensagem: " + (err.message || "—"));

        if (err.name === "NotAllowedError") {
          statusEl.textContent = "Permissão negada. Libere a câmera para este site nas configurações do Safari.";
        } else if (err.name === "NotReadableError") {
          statusEl.textContent = "A câmera está em uso por outro app. Feche outros apps e tente novamente.";
        } else {
          statusEl.textContent = "Erro ao abrir a câmera: " + err.name;
        }

        throw err;
      }
    }

    function stopCamera() {
      if (rafId) cancelAnimationFrame(rafId);
      rafId = null;

      if (stream) {
        stream.getTracks().forEach(t => t.stop());
        stream = null;
      }

      video.srcObject = null;
      ctx.clearRect(0,0,canvas.width,canvas.height);

      statusEl.textContent = "Parado.";
      badgeEl.textContent = "—";
      resultEl.textContent = "—";
      btnEnroll.disabled = true;
    }

    async function enroll() {
      const name = (nameInput.value || "").trim();
      if (!name) {
        statusEl.textContent = "Digite um nome antes de cadastrar.";
        return;
      }
      if (!stream) {
        statusEl.textContent = "Abra a câmera primeiro.";
        return;
      }

      statusEl.textContent = "Cadastrando… olhe para a câmera.";
      const det = await faceapi
        .detectSingleFace(video, new faceapi.TinyFaceDetectorOptions({ inputSize: 320, scoreThreshold: 0.5 }))
        .withFaceLandmarks()
        .withFaceDescriptor();

      if (!det) {
        statusEl.textContent = "Não detectei rosto. Melhore a luz e centralize o rosto.";
        return;
      }

      enrolledName = name;
      enrolledDescriptor = det.descriptor;

      saveProfile(enrolledName, enrolledDescriptor);
      updateProfileUI();

      statusEl.textContent = "Cadastro feito ✅ Agora comparando em tempo real.";
    }

    function setUI(type, text) {
      if (type === "match") {
        badgeEl.textContent = "MATCH";
        badgeEl.className = "badge ok";
        resultEl.textContent = text;
      } else if (type === "nomatch") {
        badgeEl.textContent = "DESCONHECIDO";
        badgeEl.className = "badge bad";
        resultEl.textContent = text;
      } else {
        badgeEl.textContent = "—";
        badgeEl.className = "badge";
        resultEl.textContent = text;
      }
    }

    async function loop() {
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

      const det = await faceapi
        .detectSingleFace(video, new faceapi.TinyFaceDetectorOptions({ inputSize: 320, scoreThreshold: 0.5 }))
        .withFaceLandmarks()
        .withFaceDescriptor();

      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

      if (!det) {
        setUI("neutral", "Sem rosto detectado.");
        rafId = requestAnimationFrame(loop);
        return;
      }

      const box = det.detection.box;
      ctx.lineWidth = 3;
      ctx.strokeStyle = "#00ff88";
      ctx.strokeRect(box.x, box.y, box.width, box.height);

      if (!enrolledDescriptor) {
        setUI("neutral", "Sem perfil cadastrado. Cadastre para comparar.");
        rafId = requestAnimationFrame(loop);
        return;
      }

      const dist = faceapi.euclideanDistance(enrolledDescriptor, det.descriptor);
      const thr = Number(threshold.value);
      const isMatch = dist <= thr;

      const label = isMatch ? `MATCH: ${enrolledName}` : "DESCONHECIDO";
      ctx.font = "18px system-ui";
      const tw = ctx.measureText(label).width;
      ctx.fillStyle = "rgba(0,0,0,0.55)";
      ctx.fillRect(box.x, Math.max(0, box.y - 26), tw + 10, 26);
      ctx.fillStyle = "#fff";
      ctx.fillText(label, box.x + 5, Math.max(18, box.y - 7));

      if (isMatch) setUI("match", `${enrolledName} (distância: ${dist.toFixed(3)})`);
      else setUI("nomatch", `Não confere (distância: ${dist.toFixed(3)})`);

      rafId = requestAnimationFrame(loop);
    }

    // --------- Botões ----------
    btnStart.addEventListener("click", async () => {
      btnStart.disabled = true;
      btnStop.disabled = false;

      try {
        await loadModels();
        loadProfile();
        updateProfileUI();

        await openCamera(); // aqui deve aparecer o "Permitir câmera"
      } catch {
        btnStart.disabled = false;
        btnStop.disabled = true;
      }
    });

    btnStop.addEventListener("click", () => {
      stopCamera();
      btnStart.disabled = false;
      btnStop.disabled = true;
    });

    btnEnroll.addEventListener("click", enroll);

    btnClear.addEventListener("click", () => {
      clearProfile();
      updateProfileUI();
      setUI("neutral", "Cadastro apagado.");
    });

    // UI inicial
    loadProfile();
    updateProfileUI();
  </script>
</body>
</html>
