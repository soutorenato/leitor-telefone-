<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Jogo de Cartas Crédito</title>

<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Comfortaa', sans-serif;
    margin: 0;
    background: #f5f7fb;
}

/* TOPO */
.topbar {
    display: flex;
    justify-content: space-between;
    padding: 15px 20px;
    background: #1E2F55;
    color: white;
}

.config {
    cursor: pointer;
}

/* SELEÇÃO DE CLIENTE */
.clientes {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin: 30px;
}

.cliente-card {
    padding: 30px;
    background: white;
    border-radius: 10px;
    cursor: pointer;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

/* LAYOUT */
.container {
    display: flex;
}

.cartas {
    width: 70%;
    display: flex;
    flex-wrap: wrap;
    gap: 15px;
    padding: 20px;
}

.carta {
    width: 120px;
    height: 160px;
    background: url('card.png') center/cover;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    cursor: pointer;
    position: relative;
}

.carta.virada {
    background: white;
    color: black;
    padding: 10px;
    flex-direction: column;
}

/* LATERAL */
.lateral {
    width: 30%;
    background: #fff;
    padding: 10px;
    overflow-y: auto;
    height: 80vh;
}

.mini-card {
    background: #f1f3f9;
    margin-bottom: 10px;
    padding: 10px;
    border-radius: 8px;
}

/* INPUTS */
input, textarea {
    width: 100%;
    margin-top: 5px;
    margin-bottom: 10px;
    padding: 5px;
}

/* BOTÃO */
button {
    padding: 8px 10px;
    border: none;
    background: #FF6A1A;
    color: white;
    cursor: pointer;
    border-radius: 5px;
}

/* DEFESA */
.defesa {
    padding: 20px;
    display: none;
}

/* MODAL */
.modal {
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.5);
    display:none;
    justify-content:center;
    align-items:center;
}

.modal-content {
    background:white;
    padding:20px;
    width:70%;
    max-height:80vh;
    overflow:auto;
}
</style>
</head>

<body>

<div class="topbar">
    <div>Jogo de Cartas Crédito</div>
    <div class="config" onclick="config()">⚙️</div>
</div>

<div class="clientes" id="clientes">
    <div class="cliente-card" onclick="iniciar('marcos')">Marcos</div>
    <div class="cliente-card" onclick="iniciar('angelica')">Angélica</div>
    <div class="cliente-card" onclick="iniciar('joaquim')">Joaquim</div>
</div>

<div class="container" style="display:none;" id="jogo">
    <div class="cartas" id="cartas"></div>
    <div class="lateral" id="lateral"></div>
</div>

<div class="defesa" id="defesa">
    <h3>Defesa de Crédito</h3>

    <textarea id="objetivo" placeholder="Objetivo do crédito"></textarea>
    <textarea id="capacidade" placeholder="Capacidade de pagamento"></textarea>
    <textarea id="relacao" placeholder="Relação PF/PJ"></textarea>
    <textarea id="garantias" placeholder="Garantias"></textarea>
    <textarea id="riscos" placeholder="Pontos de atenção"></textarea>
    <textarea id="recomendacao" placeholder="Recomendação"></textarea>

    <button onclick="avaliar()">Avaliar Defesa</button>
</div>

<div class="modal" id="modal">
    <div class="modal-content" id="resultado"></div>
</div>

<script>

let chaveOpenAI = "";

function config(){
    chaveOpenAI = prompt("Digite sua chave OpenAI:");
}

/* CASES */
const dados = {
    marcos: [
        "Cliente desde 2000",
        "Empresário",
        "Renda 37 mil",
        "Investimentos 525 mil",
        "Quer 400 mil crédito"
    ],
    angelica: [
        "Médica",
        "Renda 27 mil",
        "Endividada no cartão",
        "Pouca reserva",
        "Precisa organizar"
    ],
    joaquim: [
        "Administrador",
        "Renda alta",
        "Patrimônio elevado",
        "Quer construir casa",
        "Investimentos fora"
    ]
};

let totalCartas = 0;
let respondidas = 0;

/* INICIAR */
function iniciar(cliente){
    document.getElementById("clientes").style.display = "none";
    document.getElementById("jogo").style.display = "flex";

    const area = document.getElementById("cartas");
    area.innerHTML = "";

    totalCartas = dados[cliente].length;
    respondidas = 0;

    dados[cliente].forEach((info, i)=>{
        const carta = document.createElement("div");
        carta.className = "carta";
        carta.innerHTML = "Card " + (i+1);

        carta.onclick = ()=>{
            virarCarta(carta, info, i);
        };

        area.appendChild(carta);
    });
}

/* VIRAR CARTA */
function virarCarta(carta, info, index){
    carta.classList.add("virada");

    carta.innerHTML = `
        <div>${info}</div>
        <input placeholder="Nome do aluno">
        <textarea placeholder="Pergunta"></textarea>
        <button onclick="salvar(event, '${info}')">Salvar</button>
    `;
}

/* SALVAR */
function salvar(event, info){
    event.stopPropagation();

    const box = event.target.parentElement;
    const nome = box.querySelector("input").value;
    const pergunta = box.querySelector("textarea").value;

    if(!nome || !pergunta){
        alert("Preencha tudo");
        return;
    }

    const lateral = document.getElementById("lateral");

    const mini = document.createElement("div");
    mini.className = "mini-card";
    mini.innerHTML = `
        <b>${info}</b><br>
        ${nome}<br>
        ${pergunta}
    `;

    lateral.appendChild(mini);

    box.remove();

    respondidas++;

    if(respondidas === totalCartas){
        document.getElementById("defesa").style.display = "block";
    }
}

/* AVALIAR */
async function avaliar(){

    const texto = `
    Objetivo: ${document.getElementById("objetivo").value}
    Capacidade: ${document.getElementById("capacidade").value}
    Relação: ${document.getElementById("relacao").value}
    Garantias: ${document.getElementById("garantias").value}
    Riscos: ${document.getElementById("riscos").value}
    Recomendação: ${document.getElementById("recomendacao").value}
    `;

    const resposta = await fetch("https://api.openai.com/v1/responses", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + chaveOpenAI
        },
        body: JSON.stringify({
            model: "gpt-4.1-mini",
            input: `Analise essa defesa de crédito e responda:
            pontos fortes, pontos fracos, riscos, perguntas não feitas, nota de 0 a 10:
            ${texto}`
        })
    });

    const data = await resposta.json();

    document.getElementById("resultado").innerText =
        data.output[0].content[0].text;

    document.getElementById("modal").style.display = "flex";
}

</script>

</body>
</html>
